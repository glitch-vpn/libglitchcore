name: Build toolchain image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - go.mod
      - go.sum
      - .github/workflows/build-image.yml
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/libglitchcore-builder

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          img=$(echo "${IMAGE}" | tr '[:upper:]' '[:lower:]')
          tag=$(sha256sum Dockerfile | cut -c1-12)
          docker build -t "${img}:${tag}" -t "${img}:latest" -f Dockerfile .
          docker push "${img}:${tag}"
          docker push "${img}:latest"
