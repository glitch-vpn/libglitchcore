name: Build native libs

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build all platforms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: make test

      - name: Build FFI libraries
        run: make build

      - name: Take ownership of build_output
        run: sudo chown -R "$(id -u):$(id -g)" build_output

      - name: Include license files
        run: cp LICENSE THIRD_PARTY_NOTICES.md build_output/

      - name: List artifacts
        run: find build_output -type f -exec ls -lh {} \;

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libglitchcore-build
          path: build_output/
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: libglitchcore-build
          path: build_output/

      - name: Package artifacts
        run: |
          cd build_output
          zip -r ../libglitchcore-${{ github.ref_name }}.zip .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: libglitchcore-${{ github.ref_name }}.zip
          generate_release_notes: true
